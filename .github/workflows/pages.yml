name: Deploy to GitHub Pages

# Deploy only from `main` (the release branch).  GitHub Pages' environment
# protection rejects deploys from any other branch, so triggering on `master`
# (the working branch) only ever produced a failing "deploy" check that blocked
# PRs.  Day-to-day work lands on `master`; merging `master` into `main` releases.
on:
  push:
    branches: [main]
    paths:
      - 'Badminton-Management/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './Badminton-Management'
      - id: deployment
        uses: actions/deploy-pages@v4
